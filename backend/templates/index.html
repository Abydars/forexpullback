<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PULLBACK SYSTEM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#0a0e1a',
            panel: '#121826',
            border: '#1e2a3f',
            text: '#e2e8f0',
            muted: '#64748b',
            accent: '#3b82f6',
            success: '#10b981',
            danger: '#ef4444',
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #0a0e1a; color: #e2e8f0; font-family: Inter, sans-serif; }
    .tabular-nums { font-variant-numeric: tabular-nums; }
  </style>
</head>
<body class="min-h-screen">
  <!-- Header -->
  <header class="border-b border-border bg-panel p-4 flex justify-between items-center">
    <div class="flex items-center gap-3">
      <h1 class="text-xl font-bold tracking-wider">PULLBACK SYSTEM</h1>
    </div>
    
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-2">
        <span class="text-sm font-medium">Engine:</span>
        <div id="engine-indicator" class="w-3 h-3 rounded-full bg-muted"></div>
      </div>
      
      <button onclick="toggleMt5Modal()" id="mt5-btn" class="flex items-center gap-2 px-3 py-1.5 rounded text-sm font-medium transition-colors bg-danger/20 text-danger hover:bg-danger/30">
        MT5 Disconnected
      </button>

      <button onclick="toggleConfigModal()" class="p-2 hover:bg-border rounded transition-colors">
        ⚙️
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="p-6 space-y-6">
    <div class="flex justify-between items-center">
      <h2 class="text-2xl font-bold">Dashboard</h2>
      <button id="engine-btn" onclick="toggleEngine()" class="flex items-center gap-2 px-4 py-2 rounded font-bold bg-success/20 text-success">
        ▶ START ENGINE
      </button>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-4 gap-4">
      <div class="bg-panel border border-border p-4 rounded flex flex-col justify-center">
        <div class="text-muted flex items-center gap-2">Balance</div>
        <div id="stat-balance" class="text-2xl font-bold tabular-nums">$0.00</div>
      </div>
      <div class="bg-panel border border-border p-4 rounded flex flex-col justify-center">
        <div class="text-muted flex items-center gap-2">Equity</div>
        <div id="stat-equity" class="text-2xl font-bold tabular-nums">$0.00</div>
      </div>
      <div class="bg-panel border border-border p-4 rounded flex flex-col justify-center">
        <div class="text-muted flex items-center gap-2">Today PnL</div>
        <div id="stat-pnl" class="text-2xl font-bold tabular-nums">$0.00</div>
      </div>
      <div class="bg-panel border border-border p-4 rounded flex flex-col justify-center">
        <div class="text-muted flex items-center gap-2">Open Positions</div>
        <div id="stat-positions" class="text-2xl font-bold tabular-nums">0</div>
      </div>
    </div>

    <div class="grid grid-cols-3 gap-6">
      <div class="col-span-2 space-y-6">
        <!-- Open Positions -->
        <div class="bg-panel border border-border rounded">
          <div class="p-4 border-b border-border">
            <h3 class="text-lg font-bold">Open Positions</h3>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
              <thead>
                <tr class="border-b border-border text-sm text-muted">
                  <th class="p-4 font-normal">Ticket</th>
                  <th class="p-4 font-normal">Symbol</th>
                  <th class="p-4 font-normal">Dir</th>
                  <th class="p-4 font-normal">Lot</th>
                  <th class="p-4 font-normal">Entry</th>
                  <th class="p-4 font-normal">SL</th>
                  <th class="p-4 font-normal">TP</th>
                </tr>
              </thead>
              <tbody id="positions-tbody" class="text-sm">
                <tr><td colspan="7" class="p-4 text-center text-muted">No open positions</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Signals -->
      <div class="bg-panel border border-border rounded flex flex-col h-[calc(100vh-250px)]">
        <div class="p-4 border-b border-border">
          <h3 class="text-lg font-bold">Live Signals</h3>
        </div>
        <div id="signals-feed" class="flex-1 overflow-y-auto p-4 space-y-3">
          <!-- Signal cards injected here -->
        </div>
      </div>
    </div>
  </main>

  <!-- MT5 Modal -->
  <div id="mt5-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50">
    <div class="bg-panel border border-border rounded-lg w-full max-w-md">
      <div class="flex justify-between items-center p-4 border-b border-border">
        <h2 class="text-xl font-bold">Connect MT5</h2>
        <button onclick="toggleMt5Modal()" class="text-muted hover:text-white">✕</button>
      </div>
      <form onsubmit="connectMt5(event)" class="p-6 space-y-4">
        <div id="mt5-error" class="hidden bg-danger/20 text-danger p-3 rounded text-sm"></div>
        <div>
          <label class="block text-sm text-muted mb-1">Server</label>
          <input id="mt5-server" type="text" required class="w-full bg-bg border border-border rounded p-2 text-white focus:border-accent outline-none" />
        </div>
        <div>
          <label class="block text-sm text-muted mb-1">Login</label>
          <input id="mt5-login" type="number" required class="w-full bg-bg border border-border rounded p-2 text-white focus:border-accent outline-none" />
        </div>
        <div>
          <label class="block text-sm text-muted mb-1">Password</label>
          <input id="mt5-password" type="password" required class="w-full bg-bg border border-border rounded p-2 text-white focus:border-accent outline-none" />
        </div>
        <div class="pt-4 flex justify-end gap-3">
          <button type="button" onclick="toggleMt5Modal()" class="px-4 py-2 rounded text-muted hover:text-white">Cancel</button>
          <button type="submit" id="mt5-submit" class="bg-accent text-white px-4 py-2 rounded font-medium hover:bg-accent/90">Test & Connect</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let state = {
      mt5Connected: false,
      engineRunning: false,
      openPositions: [],
      signals: [],
      balance: 0,
      equity: 0,
      todayPnl: 0
    };

    const API_URL = '/api';

    async function fetchStatus() {
      try {
        const res = await fetch(API_URL + '/status');
        const data = await res.json();
        state.mt5Connected = data.engine_state.mt5_connected;
        state.engineRunning = data.engine_state.is_running;
        
        const posRes = await fetch(API_URL + '/trades?status=open');
        state.openPositions = await posRes.json();

        const sigRes = await fetch(API_URL + '/signals?limit=20');
        state.signals = await sigRes.json();

        render();
      } catch (e) {
        console.error("Status fetch error", e);
      }
    }

    function render() {
      // Header & Engine
      document.getElementById('engine-indicator').className = `w-3 h-3 rounded-full ${state.engineRunning ? 'bg-success' : 'bg-muted'}`;
      const engineBtn = document.getElementById('engine-btn');
      if (state.engineRunning) {
        engineBtn.className = "flex items-center gap-2 px-4 py-2 rounded font-bold bg-danger/20 text-danger";
        engineBtn.innerHTML = "■ STOP ENGINE";
      } else {
        engineBtn.className = "flex items-center gap-2 px-4 py-2 rounded font-bold bg-success/20 text-success";
        engineBtn.innerHTML = "▶ START ENGINE";
      }

      const mt5Btn = document.getElementById('mt5-btn');
      if (state.mt5Connected) {
        mt5Btn.className = "flex items-center gap-2 px-3 py-1.5 rounded text-sm font-medium transition-colors bg-[#1e2a3f] text-success hover:bg-[#2d3a54]";
        mt5Btn.innerHTML = "🔗 MT5 Connected";
      } else {
        mt5Btn.className = "flex items-center gap-2 px-3 py-1.5 rounded text-sm font-medium transition-colors bg-danger/20 text-danger hover:bg-danger/30";
        mt5Btn.innerHTML = "🔗 MT5 Disconnected";
      }

      // Stats
      document.getElementById('stat-balance').innerText = `$${state.balance.toFixed(2)}`;
      document.getElementById('stat-equity').innerText = `$${state.equity.toFixed(2)}`;
      document.getElementById('stat-positions').innerText = state.openPositions.length;

      // Positions Table
      const tbody = document.getElementById('positions-tbody');
      if (state.openPositions.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="p-4 text-center text-muted">No open positions</td></tr>';
      } else {
        tbody.innerHTML = state.openPositions.map(p => `
          <tr class="border-b border-border/50">
            <td class="p-4">${p.ticket}</td>
            <td class="p-4 font-bold">${p.symbol}</td>
            <td class="p-4 font-bold ${p.direction === 'bullish' ? 'text-success' : 'text-danger'}">${p.direction.toUpperCase()}</td>
            <td class="p-4">${p.lot}</td>
            <td class="p-4 tabular-nums">${p.entry_price}</td>
            <td class="p-4 tabular-nums">${p.sl}</td>
            <td class="p-4 tabular-nums">${p.tp}</td>
          </tr>
        `).join('');
      }

      // Signals
      const feed = document.getElementById('signals-feed');
      feed.innerHTML = state.signals.map(s => `
        <div class="bg-bg border border-border p-3 rounded text-sm">
          <div class="flex justify-between items-center mb-2">
            <span class="font-bold">${s.symbol}</span>
            <span class="px-2 py-0.5 rounded text-xs font-bold ${s.direction === 'bullish' ? 'bg-success/20 text-success' : 'bg-danger/20 text-danger'}">${s.direction.toUpperCase()}</span>
          </div>
          <div class="flex justify-between text-muted text-xs mb-2">
            <span>Score: <span class="text-white">${s.score.toFixed(1)}</span></span>
            <span>${new Date(s.created_at).toLocaleTimeString()}</span>
          </div>
          <div class="grid grid-cols-2 gap-1 text-xs">
            <div class="flex justify-between"><span>Entry:</span> <span class="tabular-nums text-white">${s.entry}</span></div>
            <div class="flex justify-between"><span>SL:</span> <span class="tabular-nums text-white">${s.sl}</span></div>
          </div>
        </div>
      `).join('');
    }

    async function toggleEngine() {
      const endpoint = state.engineRunning ? '/engine/stop' : '/engine/start';
      await fetch(API_URL + endpoint, { method: 'POST' });
      fetchStatus();
    }

    function toggleMt5Modal() {
      const modal = document.getElementById('mt5-modal');
      modal.classList.toggle('hidden');
    }

    function toggleConfigModal() {
      alert("Config modal opened. (Simplified for this example)");
    }

    async function connectMt5(e) {
      e.preventDefault();
      const server = document.getElementById('mt5-server').value;
      const login = document.getElementById('mt5-login').value;
      const password = document.getElementById('mt5-password').value;
      const errorDiv = document.getElementById('mt5-error');
      const submitBtn = document.getElementById('mt5-submit');

      errorDiv.classList.add('hidden');
      submitBtn.innerText = 'Connecting...';
      submitBtn.disabled = true;

      try {
        const res = await fetch(API_URL + '/mt5/connect', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ server, login: parseInt(login), password })
        });
        if (!res.ok) throw new Error(await res.text());
        toggleMt5Modal();
        fetchStatus();
      } catch(err) {
        errorDiv.innerText = "Connection failed";
        errorDiv.classList.remove('hidden');
      } finally {
        submitBtn.innerText = 'Test & Connect';
        submitBtn.disabled = false;
      }
    }

    // WebSockets
    function connectWs() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${protocol}//${window.location.host}/ws`;
      const ws = new WebSocket(wsUrl);
      
      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'signal.new') {
          state.signals.unshift(msg.data);
          if (state.signals.length > 20) state.signals.pop();
        } else if (msg.type === 'trade.opened') {
          state.openPositions.unshift(msg.data);
        } else if (msg.type === 'trade.closed') {
          state.openPositions = state.openPositions.filter(t => t.ticket !== msg.data.ticket);
        } else if (msg.type === 'account.tick') {
          state.balance = msg.data.balance;
          state.equity = msg.data.equity;
        }
        render();
      };
      
      ws.onclose = () => setTimeout(connectWs, 5000);
      
      setInterval(() => {
        if (ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'ping' }));
        }
      }, 20000);
    }

    // Init
    fetchStatus();
    connectWs();
    setInterval(fetchStatus, 5000);
  </script>
</body>
</html>
