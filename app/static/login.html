<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Auth</title>
    <link rel="stylesheet" href="/static/index.css">
    <style>
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            background: #0a0a0a; 
            color: #d0d0d0; 
            font-family: 'Inter', sans-serif; 
        }
        .login-box { 
            background: #111; 
            padding: 40px 30px; 
            border: 1px solid #333; 
            border-radius: 4px; 
            width: 100%; 
            max-width: 320px; 
            box-sizing: border-box;
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .login-box h2 { 
            margin-top: 0; 
            margin-bottom: 30px; 
            font-weight: 500; 
            letter-spacing: 2px; 
            color: #00ff88; 
            font-size: 18px;
        }
        .login-box input { 
            width: 100%; 
            box-sizing: border-box; 
            background: #000; 
            border: 1px solid #333; 
            color: #00ff88; 
            padding: 12px; 
            margin-bottom: 20px; 
            font-family: monospace; 
            font-size: 16px;
            outline: none; 
            text-align: center;
        }
        .login-box input:focus { 
            border-color: #00ff88; 
        }
        .login-box button { 
            width: 100%; 
            padding: 12px; 
            background: #00ff88; 
            color: #000; 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.2s; 
            letter-spacing: 1px;
        }
        .login-box button:hover { 
            background: #fff; 
        }
        .error { 
            color: #ff3333; 
            font-size: 13px; 
            margin-top: 15px; 
            display: none; 
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>SYSTEM_AUTH</h2>
        <input type="password" id="pw" placeholder="••••••••" onkeypress="if(event.key==='Enter') login()">
        <button onclick="login()">AUTHENTICATE</button>
        <div id="err" class="error">ACCESS DENIED</div>
    </div>
    <script>
        async function login() {
            const pw = document.getElementById('pw').value;
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({password: pw})
            });
            if (res.ok) {
                window.location.href = '/';
            } else {
                const err = document.getElementById('err');
                err.style.display = 'block';
                setTimeout(() => err.style.display = 'none', 3000);
            }
        }
    </script>
</body>
</html>
